name: Auto Ping Websites

on:
  schedule:
    # 3 நாட்களுக்கு ஒருமுறை நள்ளிரவு 12 மணிக்கு (UTC) வேலை செய்யும்
    - cron: '0 0 */3 * *'
  workflow_dispatch: # நீங்கள் விரும்பும் போது மேனுவலாக இயக்கிக்கொள்ளலாம்

jobs:
  ping_job:
    runs-on: ubuntu-latest
    steps:
      - name: Ping URLs 20 times
        run: |
          echo "Starting the ping process..."
          for i in {1..20}
          do
            echo "Ping attempt: $i"
            
            # முதல் URL-ஐ ping செய்தல்
            curl -s -o /dev/null -w "URL 1 HTTP Status: %{http_code}\n" https://2009shiny.gamer.gd/
            
            # இரண்டாவது URL-ஐ ping செய்தல்
            curl -s -o /dev/null -w "URL 2 HTTP Status: %{http_code}\n" "https://23122009shiny.gt.tc/?i=1"
            
            if [ $i -lt 20 ]; then
              # ஒவ்வொரு ping-க்கும் இடையே 90 நொடிகள் (1.5 நிமிடம்) காத்திருக்கவும். 
              # 20 முறை முடிவடையும் போது மொத்தம் 30 நிமிடங்கள் ஆகும்.
              echo "Waiting for next ping..."
              sleep 90
            fi
          done
          echo "Ping process completed successfully."
